<!DOCTYPE html>
<html>
<head>
    <title>Test Notifications - Supabase</title>
</head>
<body>
    <h1>Test Notifications ke Supabase</h1>
    <button onclick="testInsert()">Test Insert Notification</button>
    <button onclick="testSelect()">Test Select Notifications</button>
    <pre id="result"></pre>

    <script type="module">
        // Import supabase client
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Ganti dengan credentials Anda
        const SUPABASE_URL = localStorage.getItem('SUPABASE_URL') || prompt('Masukkan SUPABASE_URL:');
        const SUPABASE_ANON_KEY = localStorage.getItem('SUPABASE_ANON_KEY') || prompt('Masukkan SUPABASE_ANON_KEY:');

        // Save credentials
        localStorage.setItem('SUPABASE_URL', SUPABASE_URL);
        localStorage.setItem('SUPABASE_ANON_KEY', SUPABASE_ANON_KEY);

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.testInsert = async function() {
            const testNotification = {
                id: `test-${Date.now()}`,
                user_id: prompt('Masukkan user ID (contoh: 6000):'),
                type: 'account_role_changed',
                title: 'Test Notification',
                message: 'Ini adalah test notification dari script',
                timestamp: Date.now(),
                is_read: false,
                link_to: {
                    view: 'profile'
                }
            };

            log('📤 Inserting notification:', testNotification);

            const { data, error } = await supabase
                .from('notifications')
                .insert(testNotification)
                .select();

            if (error) {
                log('❌ ERROR:', {
                    message: error.message,
                    details: error.details,
                    hint: error.hint,
                    code: error.code
                });
            } else {
                log('✅ SUCCESS:', data);
            }
        };

        window.testSelect = async function() {
            const userId = prompt('Masukkan user ID untuk select:');
            log(`📥 Selecting notifications for user: ${userId}`);

            const { data, error } = await supabase
                .from('notifications')
                .select('*')
                .eq('user_id', userId);

            if (error) {
                log('❌ ERROR:', error);
            } else {
                log(`✅ SUCCESS: Found ${data.length} notifications:`, data);
            }
        };

        function log(...args) {
            const resultEl = document.getElementById('result');
            const msg = args.map(arg =>
                typeof arg === 'object' ? JSON.stringify(arg, null, 2) : arg
            ).join(' ');
            resultEl.textContent = msg + '\n\n' + resultEl.textContent;
            console.log(...args);
        }

        log('Ready! Credentials:', {
            url: SUPABASE_URL,
            hasKey: !!SUPABASE_ANON_KEY
        });
    </script>
</body>
</html>
